<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Blog preview card</title>
</head>
<body>
  <main>
    <article class="card">
      <section class="card-image">
        <img src="./assets/images/illustration-article.svg" alt="Preview image">
      </section>
      <section class="card-content">
          <span class="card-category text-preset-3-bold">Learning</span>
          <p class="text-preset-3">Published <time datetime="2023-12-21">21 Dec 2023</time></p>
          <h2 class="text-preset-1">HTML &amp; CSS foundations</h2>
          <p class="text-preset-2 color-gray-500">
            These languages are the backbone of every website, defining structure, content, and presentation.
          </p>
      </section>
      <section class="card-author">
        <img src="./assets/images/image-avatar.webp" alt="Preview image">
        <p class="text-preset-3-bold">Greg Hooper</p>
      </section>
 
    </article>


  </main>


  
</body>
</html>
